[tools]
python = "latest"
uv = 'latest'
ruff = "latest"
"github:EdJoPaTo/mqttui" = "latest"

[settings]
python.uv_venv_auto = "create|source"

[tasks.install]
description = "Install dependencies"
alias = "i"
run = "uv pip install -r requirements.txt"
sources = ["requirements.txt"]

[tasks.lint]
description = "Lint"
run = "ruff ./"

[shell_alias]
mpremote = "uv run mpremote"
